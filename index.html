<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Active Suspension | Advanced Control Systems</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">
                <span id="logo-icon"></span>
                ACTIVE SUSPENSION PRO
            </div>
            <div class="status-badge" style="background: rgba(0, 255, 100, 0.1); color: #00ff64; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; border: 1px solid rgba(0, 255, 100, 0.2);">
                SYSTEM ACTIVE
            </div>
        </header>

        <aside class="sidebar">
            <div class="card">
                <div class="card-title">
                    <span id="settings-icon"></span>
                    Controller Tuner
                </div>
                
                <div class="control-group">
                    <label>Proportional Gain (Kp) <span class="val" id="kp-val">30.0</span></label>
                    <input type="range" id="kp-slider" min="0" max="100" step="0.1" value="30.0">
                </div>

                <div class="control-group">
                    <label>Derivative Gain (Kd) <span class="val" id="kd-val">5.0</span></label>
                    <input type="range" id="kd-slider" min="0" max="20" step="0.1" value="5.0">
                </div>

                <div class="control-group">
                    <label>Integral Gain (Ki) <span class="val" id="ki-val">0.0</span></label>
                    <input type="range" id="ki-slider" min="0" max="10" step="0.1" value="0.0">
                </div>
            </div>

            <div class="card">
                <div class="card-title">
                    <span id="zap-icon"></span>
                    Disturbance Type
                </div>
                <div class="btn-group">
                    <button class="dist-btn active" data-type="step">Pothole</button>
                    <button class="dist-btn" data-type="pulse">Speed Table</button>
                    <button class="dist-btn" data-type="sine">Wavy Road</button>
                    <button class="dist-btn" data-type="impulse">Impulse</button>
                </div>
            </div>

            <div class="card">
                <div class="card-title">
                    <span id="cpu-icon"></span>
                    Quick Presets
                </div>
                <div class="btn-group">
                    <button class="preset-btn" data-kp="30" data-kd="5">Butterworth</button>
                    <button class="preset-btn" data-kp="50" data-kd="2">Sport (Stiff)</button>
                    <button class="preset-btn" data-kp="15" data-kd="8">Comfort</button>
                    <button class="preset-btn" data-kp="0" data-kd="0">Passive</button>
                </div>
            </div>

            <div class="card">
                <div class="card-title">
                    <span id="activity-icon"></span>
                    Visual Simulation
                </div>
                <div class="visual-sim">
                    <div class="road"></div>
                    <div class="road-bump" id="v-bump"></div>
                    <div class="car-wheel" id="v-wheel"></div>
                    <div class="car-body" id="v-body"></div>
                </div>
                <div style="font-size: 0.7rem; color: var(--text-dim); margin-top: 0.5rem; text-align: center;">
                    Real-time dynamics visualization
                </div>
            </div>
        </aside>

        <main class="main-content">
            <div class="card" style="flex: 1; display: flex; flex-direction: column;">
                <div class="card-title">
                    <span id="line-chart-icon"></span>
                    Response Plot: Body Displacement vs Road Profile
                </div>
                <div class="chart-container">
                    <canvas id="responseChart"></canvas>
                </div>
            </div>

            <div class="metrics-grid">
                <div class="metric-card">
                    <div class="metric-value" id="metric-settling">-</div>
                    <div class="metric-label">Settling Time (s)</div>
                </div>
                <div class="metric-card">
                    <div class="metric-value" id="metric-overshoot">-</div>
                    <div class="metric-label">Max Peak (m)</div>
                </div>
                <div class="metric-card">
                    <div class="metric-value" id="metric-damping">-</div>
                    <div class="metric-label">Est. Damping Ratio</div>
                </div>
                <div class="metric-card">
                    <div class="metric-value" id="metric-stability">Stable</div>
                    <div class="metric-label">System Status</div>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="./main.js"></script>
</body>
</html>
